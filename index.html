<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d0d0d;--surface:rgba(20,20,20,0.92);--surface2:rgba(26,26,26,0.96);
  --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.13);
  --accent:#7c7ff5;--accent2:#a5b4fc;
  --neon:#00f5ff;--neon2:rgba(0,245,255,0.12);
  --purple:#bf5af2;
  --cyan:#38bdf8;--green:#4ade80;--gold:#fde68a;--gold2:#fbbf24;
  --silver:#e2e8f0;--silver2:#cbd5e1;--red:#f87171;
  --text:#f1f5f9;--text-sub:#c4cdd8;--text-dim:rgba(255,255,255,0.48);
  --font:'Heebo',sans-serif;--radius:18px;--radius-sm:11px;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);direction:rtl;-webkit-font-smoothing:antialiased;}

/* ── ANIMATED BACKGROUND ── */
.bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-mesh::before{
  content:'';position:absolute;width:120%;height:120%;top:-10%;left:-10%;
  background:
    radial-gradient(ellipse 800px 600px at 80% 10%, rgba(99,102,241,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 600px 500px at 10% 80%, rgba(0,245,255,0.025) 0%, transparent 60%),
    radial-gradient(ellipse 500px 400px at 50% 50%, rgba(191,90,242,0.025) 0%, transparent 60%);
  animation:mesh-drift 22s ease-in-out infinite alternate;
}
@keyframes mesh-drift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(-2%,2%) scale(1.04);}}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(124,127,245,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(124,127,245,0.018) 1px,transparent 1px);
  background-size:52px 52px;}

/* ── SHARED ── */
#root{position:relative;z-index:1;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;backdrop-filter:blur(12px);}
.card-luxury{background:linear-gradient(145deg,rgba(22,22,22,0.97),rgba(14,14,14,0.98));border:1px solid var(--border-hi);border-radius:var(--radius);box-shadow:0 8px 40px rgba(0,0,0,0.65),inset 0 1px 0 rgba(255,255,255,0.07);backdrop-filter:blur(16px);}
.card-neon{background:var(--surface);border-radius:var(--radius);padding:22px;backdrop-filter:blur(12px);position:relative;}
.card-neon::before{content:'';position:absolute;inset:0;border-radius:var(--radius);padding:1px;background:linear-gradient(135deg,rgba(0,245,255,0.3),rgba(124,127,245,0.2),rgba(191,90,242,0.3));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
.label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);}
.label-accent{color:rgba(124,127,245,0.75);}
.label-cyan{color:rgba(56,189,248,0.7);}
.label-green{color:rgba(74,222,128,0.7);}
.label-gold{color:rgba(251,191,36,0.75);}
.label-silver{color:rgba(203,213,225,0.58);}
.label-red{color:rgba(248,113,113,0.75);}
.label-neon{color:rgba(0,245,255,0.8);}
.num-hero{font-size:clamp(38px,6vw,62px);font-weight:900;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-0.03em;}
.num-xl{font-size:clamp(26px,4vw,42px);font-weight:900;line-height:1;font-variant-numeric:tabular-nums;}
.num-lg{font-size:26px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;}
.num-md{font-size:21px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
button{cursor:pointer;font-family:var(--font);border:none;transition:all .18s cubic-bezier(.4,0,.2,1);}
button:active{transform:scale(0.96);}
.btn-primary{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;padding:12px 24px;border-radius:var(--radius-sm);font-weight:800;font-size:14px;box-shadow:0 4px 20px rgba(99,102,241,0.4),inset 0 1px 0 rgba(255,255,255,0.15);}
.btn-primary:hover{box-shadow:0 6px 32px rgba(99,102,241,0.65),0 0 0 1px rgba(99,102,241,0.4);transform:translateY(-1px);}
.btn-neon{background:linear-gradient(135deg,rgba(0,245,255,0.1),rgba(0,245,255,0.05));border:1px solid rgba(0,245,255,0.35);color:var(--neon);padding:10px 20px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;box-shadow:0 0 16px rgba(0,245,255,0.08);}
.btn-neon:hover{box-shadow:0 0 28px rgba(0,245,255,0.3),0 0 0 1px rgba(0,245,255,0.5);background:rgba(0,245,255,0.12);}
.btn-ghost{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text-sub);padding:8px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:13px;}
.btn-ghost:hover{background:rgba(255,255,255,0.09);color:var(--text);border-color:rgba(255,255,255,0.18);}
.btn-update{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;padding:13px 22px;border-radius:var(--radius-sm);font-weight:800;font-size:15px;width:100%;box-shadow:0 4px 24px rgba(99,102,241,0.4),inset 0 1px 0 rgba(255,255,255,0.15);}
.btn-update:hover{box-shadow:0 6px 36px rgba(99,102,241,0.6),0 0 0 1px rgba(99,102,241,0.4);transform:translateY(-1px);}
.btn-danger{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:var(--red);padding:9px 18px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;}
.btn-danger:hover{background:rgba(248,113,113,0.18);box-shadow:0 0 16px rgba(248,113,113,0.2);}
.btn-link{background:none;border:none;color:var(--accent2);font-size:12px;font-weight:600;padding:4px 8px;text-decoration:underline;text-underline-offset:3px;opacity:0.8;cursor:pointer;}
.btn-link:hover{opacity:1;color:var(--neon);}
input{background:rgba(22,22,22,0.9);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);color:var(--text);padding:12px 14px;font-size:15px;font-family:var(--font);font-weight:600;outline:none;width:100%;transition:border-color .2s,box-shadow .2s;backdrop-filter:blur(4px);}
input:focus{border-color:rgba(0,245,255,0.45);box-shadow:0 0 0 3px rgba(0,245,255,0.08),0 0 20px rgba(0,245,255,0.04);}
input::placeholder{color:var(--text-dim);font-weight:400;}
.progress-track{height:7px;background:rgba(255,255,255,0.07);border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;border-radius:999px;transition:width .9s cubic-bezier(.4,0,.2,1);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;}
.badge-green{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.22);}
.badge-gold{background:rgba(251,191,36,0.1);color:var(--gold2);border:1px solid rgba(251,191,36,0.22);}
.badge-accent{background:rgba(124,127,245,0.12);color:var(--accent2);border:1px solid rgba(124,127,245,0.28);}
.badge-silver{background:rgba(203,213,225,0.07);color:var(--silver2);border:1px solid rgba(203,213,225,0.18);}
.badge-red{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.22);}
.badge-cyan{background:rgba(56,189,248,0.1);color:var(--cyan);border:1px solid rgba(56,189,248,0.22);}
.badge-neon{background:rgba(0,245,255,0.08);color:var(--neon);border:1px solid rgba(0,245,255,0.25);}
.divider{height:1px;background:var(--border);margin:14px 0;}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.quick-btn{background:rgba(18,22,45,0.7);border:1px solid rgba(124,127,245,0.2);border-radius:var(--radius-sm);color:var(--text-sub);padding:10px 4px;font-size:12px;font-weight:800;text-align:center;transition:all .18s;}
.quick-btn:hover{background:rgba(0,245,255,0.08);border-color:rgba(0,245,255,0.4);color:var(--neon);box-shadow:0 0 16px rgba(0,245,255,0.12);transform:translateY(-2px);}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:17px;display:flex;flex-direction:column;gap:6px;transition:border-color .2s,box-shadow .2s;backdrop-filter:blur(8px);}
.stat-card:hover{border-color:rgba(0,245,255,0.2);box-shadow:0 0 20px rgba(0,245,255,0.05);}
.update-box{background:linear-gradient(145deg,rgba(13,16,35,0.95),rgba(8,10,24,0.95));border:1px solid rgba(124,127,245,0.2);border-radius:20px;padding:22px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.04);}
.update-box::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,245,255,0.4),rgba(124,127,245,0.4),transparent);}
.tier-row{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;border:1px solid transparent;transition:all .2s;}
.tier-row.active{background:rgba(74,222,128,0.06);border-color:rgba(74,222,128,0.2);box-shadow:0 0 12px rgba(74,222,128,0.05);}
.tier-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.modal-overlay{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,0.85);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:rgba(16,16,16,0.98);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:26px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.85),0 0 0 1px rgba(0,245,255,0.06);}
@media(max-width:600px){.two-col{grid-template-columns:1fr !important;}.four-col{grid-template-columns:1fr 1fr !important;}}

/* ── ANIMATIONS ── */
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
@keyframes money-fall{0%{transform:translateY(-20px);opacity:1;}100%{transform:translateY(105vh) rotate(360deg);opacity:0;}}
@keyframes sale-banner{0%{opacity:0;transform:translateX(-50%) translateY(-20px) scale(0.9);}15%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.02);}85%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}100%{opacity:0;transform:translateX(-50%) translateY(-10px) scale(0.95);}}
@keyframes star-twinkle{0%,100%{opacity:0.2;}50%{opacity:1;transform:scale(1.6);}}
@keyframes rocket-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes moon-pulse{0%,100%{filter:drop-shadow(0 0 14px rgba(210,230,255,0.55));}50%{filter:drop-shadow(0 0 40px rgba(210,230,255,1)) drop-shadow(0 0 80px rgba(180,210,255,0.65));}}
@keyframes atmo-shimmer{0%,100%{opacity:0.55;}50%{opacity:0.85;}}
@keyframes earth-glow{0%,100%{filter:drop-shadow(0 0 18px rgba(59,130,246,0.5));}50%{filter:drop-shadow(0 0 35px rgba(59,130,246,0.8));}}
@keyframes boost-in{0%{opacity:0;transform:translateY(8px);}100%{opacity:1;transform:translateY(0);}}
@keyframes float-slow{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
@keyframes glow-gold{0%,100%{text-shadow:0 0 20px rgba(251,191,36,0.4);}50%{text-shadow:0 0 40px rgba(251,191,36,0.9);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fade-up{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse-border{0%,100%{border-color:rgba(0,245,255,0.15);}50%{border-color:rgba(0,245,255,0.45);}}
.animate-boost{animation:boost-in .35s ease both;}
.animate-fade{animation:fade-up .4s ease both;}

/* ── LOGIN PAGE ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;}
.login-halo{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(ellipse,rgba(99,102,241,0.08) 0%,rgba(0,245,255,0.04) 40%,transparent 70%);pointer-events:none;animation:float-slow 6s ease-in-out infinite;}
.login-box{width:100%;max-width:420px;animation:fade-up .5s ease both;position:relative;z-index:1;}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo-icon{width:68px;height:68px;background:linear-gradient(135deg,#6366f1,#4f46e5);border-radius:22px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 8px 32px rgba(99,102,241,0.5),0 0 60px rgba(99,102,241,0.15);}
.login-title{font-size:28px;font-weight:900;background:linear-gradient(135deg,#f1f5f9,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--text-sub);}
.input-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.input-label{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--text-dim);text-transform:uppercase;}
.error-msg{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.22);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--red);text-align:center;}
.success-msg{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.22);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--green);text-align:center;}
.loading-spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,0.2);border-top-color:var(--neon);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.94);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 1px 40px rgba(0,0,0,0.6);}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,245,255,0.2),rgba(124,127,245,0.2),transparent);pointer-events:none;}
.topbar-brand{font-size:15px;font-weight:800;color:var(--silver);letter-spacing:-.01em;}
.topbar-brand span{background:linear-gradient(135deg,var(--accent2),var(--neon));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar-user{display:flex;align-items:center;gap:10px;}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#4f46e5);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 0 12px rgba(99,102,241,0.4);}

/* ── DASHBOARD LAYOUT ── */
.dash-wrap{max-width:980px;margin:0 auto;padding:20px 16px 48px;display:flex;flex-direction:column;gap:16px;}

/* ── ADMIN PANEL ── */
.admin-wrap{max-width:1100px;margin:0 auto;padding:20px 16px 48px;display:flex;flex-direction:column;gap:16px;}
.rep-table{width:100%;border-collapse:collapse;}
.rep-table th{text-align:right;padding:10px 14px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border);}
.rep-table td{padding:14px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:14px;vertical-align:middle;}
.rep-table tr:hover td{background:rgba(0,245,255,0.015);}
.rep-row-name{font-weight:700;color:var(--text);font-size:14px;}
.pace-bar{height:5px;background:rgba(255,255,255,0.07);border-radius:999px;overflow:hidden;width:80px;}
.pace-fill{height:100%;border-radius:999px;}

/* ── READONLY BANNER ── */
.readonly-banner{background:rgba(0,245,255,0.05);border:1px solid rgba(0,245,255,0.2);border-radius:12px;padding:10px 16px;font-size:12px;color:var(--neon);display:flex;align-items:center;gap:8px;animation:pulse-border 3s ease-in-out infinite;}
</style>
</head>

async function loadProfile(userId){
  const {data}=await sb.from('profiles').select('*').eq('id',userId).single();
  return data;
}
async function loadSalesData(userId){
  const now=new Date();
  const month=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const today=now.toISOString().slice(0,10);
  let {data}=await sb.from('sales').select('*').eq('user_id',userId).eq('month',month).single();
  if(!data){
    const {data:d2}=await sb.from('sales').insert({user_id:userId,month,month_sales:0,today_sales:0,today_date:today,pb:0,streak:0}).select().single();
    data=d2;
  }
  if(data && data.today_date!==today){
    const {data:d3}=await sb.from('sales').update({today_sales:0,today_date:today}).eq('id',data.id).select().single();
    data=d3;
  }
  return data;
}
async function saveSalesData(salesId, updates, fallback){
  const {data}=await sb.from('sales').update(updates).eq('id',salesId).select().single();
  // If DB returns null (RLS or no rows), keep local state with updates applied
  return data || (fallback ? {...fallback,...updates} : null);
}
async function loadAllReps(){
  const now=new Date();
  const month=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const {data:profiles}=await sb.from('profiles').select('*').eq('role','rep').order('full_name');
  const {data:sales}=await sb.from('sales').select('*').eq('month',month);
  return (profiles||[]).map(p=>{
    const s=(sales||[]).find(x=>x.user_id===p.id)||{};
    // IMPORTANT: spread profile LAST so profile.id is never overwritten by sales.id
    return{
      month_sales:s.month_sales||0,
      today_sales:s.today_sales||0,
      streak:s.streak||0,
      today_date:s.today_date||null,
      pb:s.pb||0,
      updated_at:s.updated_at||null,
      ...p, // profile data (id, full_name, email, role, settings, manager_id) wins
    };
  });
}
async function loadAppSettings(){
  const {data}=await sb.from('app_settings').select('*');
  const s={};
  (data||[]).forEach(r=>{s[r.key]=r.value;});
  return s;
}
async function saveAppSetting(key,value){
  await sb.from('app_settings').upsert({key,value:value===''||value===null?null:String(value)});
}
// Read-only sales load — no INSERT/UPDATE (safe for admin viewing any rep)
async function loadSalesDataReadOnly(userId){
  const now=new Date();
  const month=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const {data}=await sb.from('sales').select('*').eq('user_id',userId).eq('month',month).maybeSingle();
  return data||{month_sales:0,today_sales:0,today_date:null,pb:0,streak:0,updated_at:null};
}
async function loadAllManagers(){
  const {data}=await sb.from('profiles').select('*').eq('role','manager').order('full_name');
  return data||[];
}
async function loadManagerReps(managerId){
  const now=new Date();
  const month=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const {data:profiles}=await sb.from('profiles').select('*').eq('role','rep').eq('manager_id',managerId).order('full_name');
  const {data:sales}=await sb.from('sales').select('*').eq('month',month);
  return (profiles||[]).map(p=>{
    const s=(sales||[]).find(x=>x.user_id===p.id)||{};
    return{
      month_sales:s.month_sales||0,
      today_sales:s.today_sales||0,
      streak:s.streak||0,
      today_date:s.today_date||null,
      pb:s.pb||0,
      updated_at:s.updated_at||null,
      ...p,
    };
  });
}

// AUTH
// ════════════════════════════════════════════════════════════
async function init(){
  APP.appSettings=await loadAppSettings();
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    await onLogin(session.user);
  } else {
    APP.view='login'; render();
  }
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='PASSWORD_RECOVERY'){
      APP.view='reset'; APP.error=''; render(); return;
    }
    if(session) await onLogin(session.user);
    else { APP.view='login'; APP.user=null; APP.profile=null; APP.viewingRep=null; render(); }
  });
}
async function onLogin(user){
  APP.user=user;
  APP.profile=await loadProfile(user.id);
  if(!APP.profile){ APP.view='login'; APP.error='משתמש לא נמצא במערכת'; render(); return; }
  if(APP.profile.role==='admin'){
    const [reps,managers]=await Promise.all([loadAllReps(),loadAllManagers()]);
    APP.allReps=reps; APP.allManagers=managers;
    APP.view='admin';
  } else if(APP.profile.role==='manager'){
    APP.allReps=await loadManagerReps(user.id);
    APP.view='manager';
  } else {
    APP.salesData=await loadSalesData(user.id);
    APP.view='dashboard';
    startQuoteRotation();
  }
  render();
}
async function doLogin(e){
  e.preventDefault();
  const email=document.getElementById('li-email').value.trim();
  const pass=document.getElementById('li-pass').value;
  APP.error=''; render();
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){ APP.error='אימייל או סיסמה שגויים'; render(); }
}
async function doLogout(){
  await sb.auth.signOut();
  clearInterval(quoteInterval);
  APP.view='login'; APP.user=null; APP.profile=null; APP.salesData=null; APP.viewingRep=null;
  render();
}
async function doForgot(e){
  e.preventDefault();
  const email=document.getElementById('fp-email').value.trim();
  if(!email){ APP.error='נא להזין כתובת אימייל'; render(); return; }
  APP.error=''; render();
  await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.href});
  APP.forgotSent=true; render();
}
async function doResetPassword(e){
  e.preventDefault();
  const pass=document.getElementById('rp-pass').value;
  const confirm=document.getElementById('rp-confirm').value;
  if(pass!==confirm){ APP.error='הסיסמאות אינן תואמות'; render(); return; }
  if(pass.length<6){ APP.error='סיסמה חייבת להיות לפחות 6 תווים'; render(); return; }
  APP.error=''; render();
  const {error}=await sb.auth.updateUser({password:pass});
  if(error){ APP.error=error.message; render(); return; }
  APP.view='login'; APP.resetSuccess=true; render();
}

// ════════════════════════════════════════════════════════════
// SALES LOGIC
// ════════════════════════════════════════════════════════════
function calcComm(sales,tiers){
  if(!sales||sales<=0||!tiers)return 0;
  const s=[...tiers].sort((a,b)=>a.from-b.from);
  let pct=0;for(const t of s){if(sales>t.from)pct=t.pct;}
  return sales*(pct/100);
}
function getTierInfo(sales,tiers){
  if(!tiers)return[];
  const s=[...tiers].sort((a,b)=>a.from-b.from);
  let ai=0;for(let i=0;i<s.length;i++){if(sales>s[i].from)ai=i;}
  return s.map((t,i)=>({...t,isActive:i===ai&&sales>0,wouldEarn:sales*(t.pct/100)}));
}
function calcIsraeliWorkDays(){
  // Israeli work week: Sun(0)-Thu(4) are work days. Fri(5) and Sat(6) are off.
  const now=new Date();
  const year=now.getFullYear(), month=now.getMonth();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayDate=now.getDate();
  let total=0, passed=0;
  for(let d=1;d<=daysInMonth;d++){
    const dow=new Date(year,month,d).getDay();
    if(dow!==5&&dow!==6){total++; if(d<=todayDate)passed++;}
  }
  return{total,passed,left:total-passed};
}
function getMonthInfo(){
  // Use admin-set manual override if available, otherwise calc Israeli work days
  if(APP.appSettings.work_days_total){
    const totalDays=parseInt(APP.appSettings.work_days_total);
    const daysLeft=APP.appSettings.work_days_left?parseInt(APP.appSettings.work_days_left):0;
    return{totalDays,daysPassed:totalDays-daysLeft,daysLeft};
  }
  const {total,passed,left}=calcIsraeliWorkDays();
  return{totalDays:total,daysPassed:passed,daysLeft:left};
}

function celebrateSale(){
  const layer=document.getElementById("confetti-layer");
  if(!layer)return; layer.innerHTML="";
  const colors=["#7c7ff5","#00f5ff","#4ade80","#fde68a","#f472b6","#a5b4fc","#bf5af2"];
  for(let i=0;i<65;i++){
    const d=document.createElement("div");
    const sz=4+Math.random()*8,x=Math.random()*100,del=Math.random()*.5,dur=1.5+Math.random()*1.3;
    d.style.cssText=`position:absolute;left:${x}%;top:-20px;width:${sz}px;height:${sz}px;background:${colors[i%7]};border-radius:${i%3===0?'50%':'3px'};animation:confetti-fall ${dur}s ${del}s ease-in forwards;`;
    layer.appendChild(d);
  }
  for(let i=0;i<10;i++){
    const m=document.createElement("div");
    const x=5+Math.random()*90,del=Math.random()*.6,dur=1.8+Math.random()*1.2,sz=20+Math.random()*14;
    m.style.cssText=`position:absolute;left:${x}%;top:-40px;font-size:${sz}px;animation:money-fall ${dur}s ${del}s ease-in forwards;`;
    m.textContent="💵"; layer.appendChild(m);
  }
  setTimeout(()=>{if(layer)layer.innerHTML="";},4200);
  const banner=document.getElementById("sale-banner");
  if(banner){banner.style.display="block";banner.style.animation="sale-banner 3s ease forwards";setTimeout(()=>{banner.style.display="none";banner.style.animation="";},3100);}
  APP.moonGlowing=true; clearTimeout(moonTimeout); render();
  moonTimeout=setTimeout(()=>{APP.moonGlowing=false;render();},3600);
}
function startQuoteRotation(){
  if(quoteInterval)clearInterval(quoteInterval);
  quoteInterval=setInterval(()=>{
    APP.quoteIdx=(APP.quoteIdx+1)%QUOTES.length;
    const el=document.getElementById("quote-block");
    if(el){el.style.transition="opacity .4s";el.style.opacity="0";setTimeout(()=>render(),420);}
  },3600000);
}

// RENDER ENGINE
// ════════════════════════════════════════════════════════════
function render(){
  const root=document.getElementById('root');
  if(APP.view==='loading'){
    root.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
      <div class="loading-spinner" style="width:36px;height:36px;border-width:3px;"></div>
      <div style="font-size:11px;color:var(--text-dim);letter-spacing:.12em;">טוען...</div>
    </div>`;
    return;
  }
  if(APP.view==='login'){ root.innerHTML=renderLogin(); return; }
  if(APP.view==='forgot'){ root.innerHTML=renderForgot(); return; }
  if(APP.view==='reset'){ root.innerHTML=renderReset(); return; }
  if(APP.view==='admin'){
    if(APP.viewingRep){
      root.innerHTML=renderTopbar()+renderRepViewBanner()+renderDashboard(APP.viewingRep.profile,APP.viewingRep.salesData,true);
    } else {
      root.innerHTML=renderTopbar()+renderAdmin();
    }
    return;
  }
  if(APP.view==='manager'){
    if(APP.viewingRep){
      root.innerHTML=renderTopbar()+renderRepViewBanner()+renderDashboard(APP.viewingRep.profile,APP.viewingRep.salesData,true);
    } else {
      root.innerHTML=renderTopbar()+renderManager();
    }
    return;
  }
  if(APP.view==='dashboard'){ root.innerHTML=renderTopbar()+renderDashboard(APP.profile,APP.salesData,false); return; }
}

// ── TOPBAR ──
function renderTopbar(){
  const p=APP.profile;
  const isAdmin=p&&p.role==='admin';
  const isManager=p&&p.role==='manager';
  const isViewingRep=APP.viewingRep!==null;
  const initials=p?p.full_name.split(' ').map(w=>w[0]).join('').slice(0,2):'?';
  let backFn='backToAdmin';
  let title=isViewingRep?APP.viewingRep.profile.full_name:isAdmin?'ניהול צוות':isManager?'צוות שלי':'מרכז מכירות';
  let roleBadge=isAdmin?`<span style="font-size:10px;background:rgba(124,127,245,0.15);color:var(--accent2);padding:2px 7px;border-radius:5px;font-weight:700;border:1px solid rgba(124,127,245,0.25);">ADMIN</span>`:isManager?`<span style="font-size:10px;background:rgba(0,245,255,0.1);color:var(--neon);padding:2px 7px;border-radius:5px;font-weight:700;border:1px solid rgba(0,245,255,0.2);">מנהל</span>`:'';
  return`<div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      ${isViewingRep?`<button onclick="${backFn}()" class="btn-neon" style="font-size:12px;padding:7px 14px;">← חזור</button>`:''}

          ${reps.length===0?`<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-dim);">אין נציגים עדיין — הוסף נציג ראשון</td></tr>`:
          reps.map(r=>{
            const monthSales=r.month_sales||0;
            const target=r.settings?.monthTarget||0;
            const pct=target>0?Math.min((monthSales/target)*100,100):0;
            const todaySales=r.today_sales||0;
            const todayTarget=r.settings?.dailyTarget||0;
            const dailyAvgActual=daysPassed>0?monthSales/Math.max(daysPassed,1):0;
            const dailyAvgNeeded=daysLeft>0?(target-monthSales)/daysLeft:0;
            const onPace=dailyAvgActual>=dailyAvgNeeded;
            const initials=r.full_name.split(' ').map(w=>w[0]).join('').slice(0,2);
            return`<tr>
              <td>
                <div style="display:flex;align-items:center;gap:10px;">
                  <div class="avatar" style="width:32px;height:32px;font-size:11px;">${initials}</div>

              <td>
                <div style="display:flex;align-items:center;gap:8px;">
                  <div class="pace-bar"><div class="pace-fill" style="width:${pct}%;background:${pct>=100?"linear-gradient(90deg,#fbbf24,#fde68a)":"linear-gradient(90deg,#4f46e5,#00f5ff)"};"></div></div>
                  <span style="font-size:12px;font-weight:700;color:${pct>=100?"var(--gold2)":"var(--neon)"};">${pct.toFixed(0)}%</span>
                </div>
              </td>
              <td><span style="font-weight:700;color:${pct>=100?"var(--gold2)":"var(--red)"};">₪${fmt(Math.max(0,target-monthSales))}</span></td>
              <td><span style="font-weight:700;color:${onPace?"var(--green)":"var(--red)"};">${daysLeft>0?`₪${fmt(Math.max(0,dailyAvgNeeded))}`:"—"}</span><div style="font-size:9px;color:var(--text-dim);">/יום</div></td>
              <td><span style="font-weight:700;color:var(--cyan);">₪${fmt(todaySales)}</span>${todayTarget>0?`<div style="font-size:10px;color:var(--text-dim);">מ-₪${fmt(todayTarget)}</div>`:''}</td>
              <td><span style="font-weight:700;color:#fb923c;">${r.streak||0} ימים</span></td>
              <td>

                  ? `<select onchange="assignManager('${r.id}',this.value)" style="background:rgba(22,22,22,0.9);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:var(--text);padding:5px 8px;font-size:11px;font-family:var(--font);font-weight:600;outline:none;max-width:110px;">
                      <option value="">ללא</option>
                      ${APP.allManagers.map(m=>`<option value="${m.id}" ${r.manager_id===m.id?'selected':''}>${m.full_name}</option>`).join('')}
                    </select>`
                  : `<span style="font-size:11px;color:var(--text-dim);">—</span>`}
              </td>
              <td>${pct>=100?`<span class="badge badge-gold">🏆 יעד!</span>`:onPace?`<span class="badge badge-green">🚀 בדרך לירח!</span>`:`<span class="badge badge-red">⬆️ להרים קצב</span>`}</td>
              <td>
                <div style="display:flex;gap:5px;align-items:center;">
                  <button onclick="editRep('${r.id}')" class="btn-ghost" style="font-size:11px;padding:5px 10px;white-space:nowrap;">✏️ ערוך</button>
                  <button onclick="deleteRep('${r.id}','${r.full_name}')" class="btn-danger" style="font-size:11px;padding:5px 10px;white-space:nowrap;">🗑️</button>
                </div>
              </td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>
  </div>

  <!-- MANAGERS SECTION -->
  <div class="card" style="border-color:rgba(0,245,255,0.15);background:linear-gradient(145deg,rgba(0,245,255,0.03),rgba(124,127,245,0.03));">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div class="label label-neon">👤 מנהלי מכירות (${APP.allManagers.length})</div>
      <button onclick="showAddRep()" class="btn-ghost" style="font-size:11px;padding:5px 12px;">+ הוסף משתמש</button>

      ${APP.allManagers.map(m=>{
        const initials=m.full_name.split(' ').map(w=>w[0]).join('').slice(0,2);
        const myReps=APP.allReps.filter(r=>r.manager_id===m.id);
        return`<div style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(0,245,255,0.12);border-radius:10px;padding:10px 14px;">

  </div>`;
}

      <div class="label" style="margin-bottom:8px;">ימים בחודש</div>

      <table class="rep-table">
        <thead><tr>
          <th>נציג</th><th>מכירות חודש</th><th>יעד חודשי</th><th>התקדמות</th>
          <th>נותר ליעד</th><th>ממוצע יומי נדרש</th><th>היום</th><th>רצף</th><th>סטטוס</th>

          ${reps.length===0?`<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text-dim);">אין נציגים מוצמדים אליך עדיין</td></tr>`:
          reps.map(r=>{

              <td><span style="color:var(--text-sub);">₪${fmt(target)}</span></td>
              <td><div style="display:flex;align-items:center;gap:8px;">
                <div class="pace-bar"><div class="pace-fill" style="width:${pct}%;background:${pct>=100?"linear-gradient(90deg,#fbbf24,#fde68a)":"linear-gradient(90deg,#4f46e5,#00f5ff)"};"></div></div>
                <span style="font-size:12px;font-weight:700;color:${pct>=100?"var(--gold2)":"var(--neon)"};">${pct.toFixed(0)}%</span>
              </div></td>
              <td><span style="font-weight:700;color:${pct>=100?"var(--gold2)":"var(--red)"};">₪${fmt(Math.max(0,target-monthSales))}</span></td>
              <td><span style="font-weight:700;color:${onPace?"var(--green)":"var(--red)"};">${daysLeft>0?`₪${fmt(Math.max(0,dailyAvgNeeded))}`:"—"}</span><div style="font-size:9px;color:var(--text-dim);">/יום</div></td>
              <td><span style="font-weight:700;color:var(--cyan);">₪${fmt(todaySales)}</span>${todayTarget>0?`<div style="font-size:10px;color:var(--text-dim);">מ-₪${fmt(todayTarget)}</div>`:''}</td>
              <td><span style="font-weight:700;color:#fb923c;">${r.streak||0} ימים</span></td>
              <td>${pct>=100?`<span class="badge badge-gold">🏆 יעד!</span>`:onPace?`<span class="badge badge-green">🚀 בדרך לירח!</span>`:`<span class="badge badge-red">⬆️ להרים קצב</span>`}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>
  </div>
  </div>`;
}

}

// ACTIONS

window.nextQuote=()=>{
  APP.quoteIdx=(APP.quoteIdx+1)%QUOTES.length;
  const el=document.getElementById("quote-block");
  if(el){el.style.transition="opacity .35s";el.style.opacity="0";setTimeout(()=>render(),360);}else render();
};

window.doUpdateSales=async()=>{
  const el=document.getElementById('sale-input');
  const newTotal=parseFloat(el?el.value:'');
  if(isNaN(newTotal)||newTotal<0)return;
  const s=APP.salesData;
  const prev=s.today_sales||0, diff=newTotal-prev;
  const newMonth=Math.max(0,(s.month_sales||0)+diff);
  const newPb=newTotal>=(s.pb||0)?newTotal:(s.pb||0);
  const newStreak=(prev===0&&newTotal>0)?(s.streak||0)+1:(s.streak||0);
  const newMonthPb=newMonth>=(s.month_pb||0)?newMonth:(s.month_pb||0);
  const updates={today_sales:newTotal,month_sales:newMonth,pb:newPb,month_pb:newMonthPb,streak:newStreak,updated_at:new Date().toISOString()};
  APP.salesData=await saveSalesData(s.id,updates,s);
  if(el)el.value='';
  if(diff>0)celebrateSale();else render();
};

window.doCancellation=async()=>{
  const el=document.getElementById('cancel-input');
  const amount=parseFloat(el?el.value:'');
  if(isNaN(amount)||amount<=0)return;
  const s=APP.salesData;
  const newToday=Math.max(0,(s.today_sales||0)-amount);
  const newMonth=Math.max(0,(s.month_sales||0)-amount);
  const newMonthPb=s.month_pb||0;
  const updates={today_sales:newToday,month_sales:newMonth,month_pb:newMonthPb,updated_at:new Date().toISOString()};
  APP.salesData=await saveSalesData(s.id,updates,s);
  if(el)el.value='';
  APP.showCancelModal=true;
  render();
};

window.doQuickAdd=async(v)=>{
  const s=APP.salesData;
  const newToday=(s.today_sales||0)+v;
  const newMonth=(s.month_sales||0)+v;
  const newPb=newToday>=(s.pb||0)?newToday:(s.pb||0);
  const updates={today_sales:newToday,month_sales:newMonth,pb:newPb,updated_at:new Date().toISOString()};
  APP.salesData=await saveSalesData(s.id,updates);
  celebrateSale();
};

window.closeCancelModal=()=>{APP.showCancelModal=false;render();};

window.refreshAdmin=async()=>{
  const [reps,managers]=await Promise.all([loadAllReps(),loadAllManagers()]);
  APP.allReps=reps;APP.allManagers=managers;render();
};

window.showAddRep=()=>{APP.showAddRepModal=true;APP.addRepError='';render();};
window.closeAddRep=(e)=>{if(!e||e.target===e.currentTarget){APP.showAddRepModal=false;render();}};

window.viewRep=async(userId)=>{
  const [profile,salesData]=await Promise.all([loadProfile(userId),loadSalesDataReadOnly(userId)]);
  APP.viewingRep={profile,salesData};
  render();
};
window.backToAdmin=()=>{APP.viewingRep=null;render();};

window.editRep=(userId)=>{
  // Search in both reps and managers lists
  const rep=APP.allReps.find(r=>r.id===userId)||APP.allManagers.find(m=>m.id===userId)||null;
  if(!rep){alert('לא נמצא משתמש — נסה לרענן');return;}
  APP.editingRep=rep;
  APP.editRepError='';
  APP.showEditRepModal=true;
  render();
};
window.closeEditRep=(e)=>{
  if(!e||e.target===e.currentTarget){APP.showEditRepModal=false;APP.editingRep=null;render();}
};
window.doEditRep=async(userId)=>{
  const name=document.getElementById('er-name').value.trim();
  const roleEl=document.getElementById('er-role');
  const newRole=roleEl?roleEl.value:'rep';
  const managerEl=document.getElementById('er-manager');
  const managerId=managerEl?(managerEl.value||null):null;
  if(!name){APP.editRepError='שם לא יכול להיות ריק';render();return;}
  const updates={full_name:name,role:newRole,manager_id:managerId};
  if(newRole==='rep'){
    const bonus=+document.getElementById('er-bonus').value||2000;
    const mt=+document.getElementById('er-mtarget').value||150000;
    const dt=+document.getElementById('er-dtarget').value||7000;
    const tiers=[
      {from:+document.getElementById('et0-from').value||0,to:document.getElementById('et0-to').value?+document.getElementById('et0-to').value:50000,pct:+document.getElementById('et0-pct').value||5},
      {from:+document.getElementById('et1-from').value||50000,to:document.getElementById('et1-to').value?+document.getElementById('et1-to').value:100000,pct:+document.getElementById('et1-pct').value||8},
      {from:+document.getElementById('et2-from').value||100000,to:document.getElementById('et2-to').value?+document.getElementById('et2-to').value:null,pct:+document.getElementById('et2-pct').value||12},
    ];
    updates.settings={targetBonus:bonus,monthTarget:mt,dailyTarget:dt,tiers};
  }
  // Use SECURITY DEFINER function to bypass RLS — returns row count
  const {data:rowsUpdated,error}=await sb.rpc('admin_update_profile',{
    p_id:userId,
    p_full_name:updates.full_name,
    p_role:updates.role,
    p_manager_id:updates.manager_id||null,
    p_settings:updates.settings||null
  });
  if(error){
    console.error('doEditRep RPC error:',error);
    APP.editRepError='שגיאת שמירה: '+error.message;
    render();return;
  }
  if(!rowsUpdated||rowsUpdated<1){
    console.warn('doEditRep: 0 rows updated — userId:',userId);
    APP.editRepError='⚠️ לא עודכן (0 שורות). בדוק שה-SQL הורץ נכון.';
    render();return;
  }
  console.log('doEditRep: updated',rowsUpdated,'row(s) for userId',userId,'→ role:',updates.role);
  APP.showEditRepModal=false;APP.editingRep=null;
  const [reps,managers]=await Promise.all([loadAllReps(),loadAllManagers()]);
  APP.allReps=reps;APP.allManagers=managers;
  render();
};

window.deleteRep=async(userId,name)=>{
  if(!confirm(`למחוק את ${name} מהמערכת?\n\nהמשתמש לא יוכל להתחבר יותר.\nניתן לשחזר בעתיד עם אותו מייל.`))return;
  // Delete sales data and profile
  await sb.from('sales').delete().eq('user_id',userId);
  await sb.from('profiles').delete().eq('id',userId);
  // Delete from Supabase Auth — frees up the email for future reuse
  const {error:authDelErr}=await sbAdmin.auth.admin.deleteUser(userId);
  if(authDelErr){
    // Non-fatal — profile is already deleted, just warn
    console.warn('Auth delete warning:',authDelErr.message);
  }
  const [reps,managers]=await Promise.all([loadAllReps(),loadAllManagers()]);
  APP.allReps=reps;APP.allManagers=managers;
  render();
};

window.saveWorkDays=async()=>{
  const total=document.getElementById('wd-total').value;
  const left=document.getElementById('wd-left').value;
  await saveAppSetting('work_days_total',total||null);
  await saveAppSetting('work_days_left',left||null);
  APP.appSettings=await loadAppSettings();
  render();
};

window.resetWorkDays=async()=>{
  await saveAppSetting('work_days_total',null);
  await saveAppSetting('work_days_left',null);
  APP.appSettings=await loadAppSettings();
  render();
};

window.doAddRep=async()=>{
  const name=document.getElementById('ar-name').value.trim();
  const email=document.getElementById('ar-email').value.trim();
  const pass=document.getElementById('ar-pass').value;
  const roleEl=document.getElementById('ar-role');
  const role=roleEl?roleEl.value:'rep';
  const managerEl=document.getElementById('ar-manager');
  const managerId=managerEl?managerEl.value||null:null;
  if(!name||!email||!pass){APP.addRepError='נא למלא שם, אימייל וסיסמה';render();return;}
  if(pass.length<6){APP.addRepError='סיסמה חייבת להיות לפחות 6 תווים';render();return;}
  const btn=document.getElementById('add-rep-btn');
  if(btn){btn.textContent='יוצר...';btn.disabled=true;}

  const showErr=(msg)=>{APP.addRepError=msg;if(btn){btn.textContent='צור משתמש';btn.disabled=false;}render();};

  try{
    // Use admin client — does NOT touch the admin's session at all
    const {data:authData,error:authErr}=await sbAdmin.auth.admin.createUser({
      email,
      password:pass,
      email_confirm:true,  // mark as confirmed — welcome email sent via EmailJS instead
      user_metadata:{full_name:name}
    });

    if(authErr){
      if(authErr.message?.includes('422')||authErr.status===422||authErr.message?.toLowerCase().includes('already')){
        showErr('המייל כבר קיים במערכת. מחק את המשתמש הישן קודם.');
      } else {
        showErr('שגיאת יצירה: '+authErr.message);
      }
      return;
    }

    const userId=authData?.user?.id||null;
    if(!userId){showErr('שגיאה: לא התקבל ID מ-Supabase.');return;}

    let profileData={id:userId,full_name:name,email,role};
    if(managerId)profileData.manager_id=managerId;
    if(role==='rep'){
      const bonus=+document.getElementById('ar-bonus').value||2000;
      const mt=+document.getElementById('ar-mtarget').value||150000;
      const dt=+document.getElementById('ar-dtarget').value||7000;
      const tiers=[
        {from:+document.getElementById('t0-from').value||0,to:+document.getElementById('t0-to').value||50000,pct:+document.getElementById('t0-pct').value||5},
        {from:+document.getElementById('t1-from').value||50000,to:+document.getElementById('t1-to').value||100000,pct:+document.getElementById('t1-pct').value||8},
        {from:+document.getElementById('t2-from').value||100000,to:document.getElementById('t2-to').value?+document.getElementById('t2-to').value:null,pct:+document.getElementById('t2-pct').value||12},
      ];
      profileData.settings={targetBonus:bonus,monthTarget:mt,dailyTarget:dt,tiers};
    }

    // Try direct upsert first, fallback to RPC
    const {error:upsertErr}=await sb.from('profiles').upsert(profileData);
    if(upsertErr){
      const {error:rpcErr}=await sb.rpc('admin_upsert_profile',{
        p_id:profileData.id,
        p_full_name:profileData.full_name,
        p_email:profileData.email,
        p_role:profileData.role,
        p_manager_id:profileData.manager_id||null,
        p_settings:profileData.settings||null
      });
      if(rpcErr){showErr('שגיאה ביצירת פרופיל: '+rpcErr.message);return;}
    }

    // Success — close modal, reload lists, send welcome email
    // (EmailJS runs in background — no need to block UI)
    APP.showAddRepModal=false;
    APP.addRepError='';
    const [reps,managers]=await Promise.all([loadAllReps(),loadAllManagers()]);
    APP.allReps=reps;APP.allManagers=managers;
    render();
    sendWelcomeEmail(name,email,pass,role); // runs in background, no await needed

  }catch(e){
    showErr('שגיאה לא צפויה: '+e.message);
  }
};

window.refreshManager=async()=>{
  APP.allReps=await loadManagerReps(APP.user.id);render();
};

window.assignManager=async(repId,managerId)=>{
  const val=managerId||null;
  const {error}=await sb.from('profiles').update({manager_id:val}).eq('id',repId);
  if(error){alert('שגיאה בשיוך: '+error.message);return;}
  // Update locally without full reload for speed
  APP.allReps=APP.allReps.map(r=>r.id===repId?{...r,manager_id:val}:r);
  render();
};

async function sendWelcomeEmail(name,email,pass,role){
  const roleHeb=role==='manager'?'מנהל מכירות':'נציג מכירות';
  console.log('📧 Sending welcome email to', email);
  try{
    const res=await emailjs.send(
      EMAILJS_SERVICE,
      EMAILJS_TEMPLATE,
      {
        to_name:    name,
        to_email:   email,
        email:      email,
        user_email: email,
        user_pass:  pass,
        user_role:  roleHeb,
        site_url:   window.location.origin+window.location.pathname,
      },
      {publicKey: EMAILJS_KEY}
    );
    console.log('✅ Email sent:', res.status, res.text);
  }catch(e){
    console.error('❌ EmailJS failed:', e?.text||e?.message||JSON.stringify(e));
  }
}

init();
</script>
